<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>Prova Virtual — Koisa Linda</title>
  <link rel="icon" href="img/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <style>
    :root{--ruby:#722f37;--cream:#fbf7ef;--paper:#fff;--ink:#2c2326;--muted:#746960;--line:#e7ded1;--gold:#b8945f}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--cream);color:var(--ink);font-family:"Questrial",Arial,sans-serif;-webkit-font-smoothing:antialiased}
    main{width:min(100%,620px);padding:48px 34px;text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:28px;box-shadow:0 22px 70px rgba(44,35,38,.09)}
    .logo{width:78px;height:auto;margin-bottom:18px}
    .eyebrow{margin:0 0 12px;color:var(--ruby);font-size:11px;letter-spacing:3px;text-transform:uppercase}
    h1{margin:0;font-family:"Playfair Display",Georgia,serif;font-size:clamp(34px,7vw,52px);font-style:italic;font-weight:400;line-height:1.05}
    p{max-width:430px;margin:18px auto 0;color:var(--muted);font-family:Georgia,serif;font-size:18px;line-height:1.55}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;margin-top:26px;padding:14px 24px;border-radius:999px;background:var(--ruby);color:#fff;font-size:12px;letter-spacing:1.5px;text-decoration:none;text-transform:uppercase}
    a:focus-visible{outline:3px solid var(--gold);outline-offset:4px}
    noscript p{font-family:"Questrial",Arial,sans-serif;font-size:14px}
    noscript a{display:inline-flex}
    @media(max-width:520px){main{padding:38px 22px;border-radius:22px}.logo{width:68px}}
  </style>
</head>
<body>
  <main>
    <img class="logo" src="img/logo-kl-main.png" alt="Koisa Linda">
    <p class="eyebrow">Prova Virtual</p>
    <h1>A experiência agora está no catálogo.</h1>
    <p>Você será levada para a Prova Virtual integrada, sem sair do universo Koisa Linda.</p>
    <a id="catalog-tryon-link" href="catalogo.html?prova=1">Abrir Prova Virtual</a>
    <noscript><p>Se a página não abrir automaticamente, <a href="catalogo.html?prova=1">acesse a Prova Virtual no catálogo</a>.</p></noscript>
  </main>
  <script>
    (function(){
      'use strict';
      var source=new URL(location.href);
      var raw=source.searchParams.get('p');
      var code=raw===null?'':raw.trim().toUpperCase();
      var target=new URL('catalogo.html?prova=1',location.href);
      if(code&&code.length<=64&&/^[A-Z0-9][A-Z0-9._ /-]*$/.test(code)){
        target.searchParams.set('p',code);
      }
      var href=target.href;
      document.getElementById('catalog-tryon-link').href=href;
      location.replace(href);
    }());
  </script>
<script>(function(){var h=location.hash;if(!h||h.length<2)return;function go(){var el=document.querySelector(h);if(el)el.scrollIntoView();}addEventListener("load",function(){setTimeout(go,150);});})();</script></body>
</html>
